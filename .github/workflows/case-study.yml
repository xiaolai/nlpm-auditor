name: Write Case Study

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/name)'
        required: true
      issue_number:
        description: 'Tracking issue number'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  write:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'case-study-ready')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "repo=$INPUT_REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            REPO=$(echo "$ISSUE_TITLE" | sed 's/Audit candidate: //')
            echo "repo=$REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather evidence from GitHub
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          mkdir -p /tmp/evidence

          # Repo metadata
          gh api "repos/$TARGET_REPO" --jq '{
            name: .full_name, description: .description,
            stars: .stargazers_count, forks: .forks_count,
            owner_login: .owner.login, owner_type: .owner.type
          }' > /tmp/evidence/repo.json

          # Owner profile
          OWNER=$(echo "$TARGET_REPO" | cut -d/ -f1)
          gh api "users/$OWNER" --jq '{login, name, html_url}' \
            > /tmp/evidence/owner.json 2>/dev/null || echo "{}" > /tmp/evidence/owner.json

          # Our PRs and issues
          gh pr list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,mergedAt,labels,url \
            > /tmp/evidence/prs.json 2>/dev/null || echo "[]" > /tmp/evidence/prs.json

          gh issue list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,url \
            > /tmp/evidence/issues.json 2>/dev/null || echo "[]" > /tmp/evidence/issues.json

          # Commits mentioning NLPM or Claude co-authorship
          gh api "repos/$TARGET_REPO/commits?per_page=50" \
            --jq '[.[] | select(.commit.message | test("nlpm|NLPM|Co-Authored-By.*Claude"; "i")) | {
              sha: .sha, message: .commit.message,
              date: .commit.committer.date, url: .html_url
            }]' > /tmp/evidence/commits.json 2>/dev/null || echo "[]" > /tmp/evidence/commits.json

          # PR review comments
          jq -r '.[].number' /tmp/evidence/prs.json 2>/dev/null | while read -r pr_num; do
            gh api "repos/$TARGET_REPO/pulls/$pr_num/reviews" \
              --jq '[.[] | {user: .user.login, state: .state, body: .body}]' \
              > "/tmp/evidence/pr-${pr_num}-reviews.json" 2>/dev/null || true
            sleep 1
          done

          # Copy audit report
          REPORT="audits/${TARGET_REPO//\//-}.md"
          [ -f "$REPORT" ] && cp "$REPORT" /tmp/evidence/audit-report.md || echo "No audit report" > /tmp/evidence/audit-report.md

      - name: Prepare case study prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/case-study-prompt.md <<PROMPT_EOF
          You are writing a case study article about an NLPM audit engagement.

          ## Source Material

          All evidence is in /tmp/evidence/ — read EVERY file:
          - repo.json: target repo metadata
          - owner.json: repo owner profile
          - prs.json: all PRs we submitted (with URLs)
          - issues.json: tracking issues we created
          - commits.json: commits mentioning NLPM or Claude
          - pr-*-reviews.json: maintainer review comments
          - audit-report.md: the full NLPM scoring report

          ## Article Template

          Write to: case-studies/$SLUG.md

          Structure:
          1. **Title** — creative, hints at what was learned
          2. **Disclosure** — mandatory blockquote:
             > **Disclosure**: This article was generated by an automated pipeline using Claude (Sonnet 4.6) based on audit data and GitHub records. It describes work performed by NLPM tooling maintained by [xiaolai](https://github.com/xiaolai). Readers should weigh claims accordingly.
          3. **The Project** — what it is, who maintains it (link owner profile), star count (once)
          4. **The Audit** — overall score, distribution (mermaid pie chart), top issues, fair assessment
          5. **What Was Submitted** — each PR with GitHub URL, title, fix description
          6. **The Response** — maintainer reaction from review comments and commits
          7. **What the Audit Revealed** — patterns with fairness note
          8. **Timeline** — mermaid gantt chart from PR/issue timestamps
          9. **Limitations** — what this doesn't prove
          10. **Significance** — measured, not inflated

          ## Style Rules (first draft)
          - Write clean, factual prose first — ornate wording comes in the polish pass
          - ALL links from evidence files — never fabricate URLs
          - ALL numbers from evidence files — never guess
          - If evidence is missing for a section, say so honestly

          ## Mermaid Diagram Requirements
          - Score distribution: mermaid pie chart
          - Timeline: mermaid gantt chart (dateFormat YYYY-MM-DD HH:mm, axisFormat %H:%M)
          - PR priority grouping: mermaid graph LR with colored subgraphs if 3+ priority tiers
          - Parallel/sequential failure: mermaid sequenceDiagram if applicable
          - Find ANY data that would be clearer as a diagram than a table — use mermaid
          - Do NOT use ASCII art or text-based diagrams — always mermaid

          ## Also write
          - /tmp/case-study-summary.txt: one-line summary for the issue comment
          PROMPT_EOF

      - name: Write with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/case-study-prompt.md
          allowed_tools: Read,Glob,Grep,Write,Bash

      - name: Polish prose — ornate wording pass
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"

          if [ ! -f "$ARTICLE" ]; then
            echo "No article found at $ARTICLE — skipping polish"
            exit 0
          fi

          cat > /tmp/polish-prompt.md <<'POLISH_EOF'
          You are a prose polisher. Read the case study article and add literary texture.

          ## What to add (sparingly — 8-15 touches total)

          **Similes** — compare technical concepts to everyday things:
          - "like handing someone a magnifying glass and pointing at a building"
          - "like a bridge with 80 bolts where 5 are missing"

          **Metaphors** — make abstract things concrete:
          - "a mirror as much as a microscope"
          - "the git equivalent of five chefs sharing one cutting board"

          **Analogies** — connect unfamiliar to familiar:
          - "discovered defects the way you discover a hole in your umbrella — by getting rained on"
          - "like a receptionist who only says 'ask the person down the hall'"

          **Punch lines** — reward the reader at key moments:
          - "Sometimes the sequel is shorter than the blooper reel"
          - After a duplicate PR: "In open source, it's perfectly fine to arrive second with the right answer"

          **Witty observations** — gentle, never sarcastic:
          - "missing its own name" (for a command without a name: field)
          - "a quiet acknowledgment that the diagnosis came from somewhere worth naming"

          ## Rules

          - SOFT TONE — never presumptuous, never mocking the target project
          - Polite — these are other people's hard work
          - Place touches at narrative beats, not randomly
          - Do NOT add ornament to technical tables, code blocks, or data
          - Do NOT change any facts, numbers, links, or mermaid blocks
          - Do NOT add more than 15 touches — restraint is elegance
          - The title should be creative (not "NLPM Audit of X" — something that hints at the story)
          - The closing paragraph deserves a memorable final line

          ## Process

          1. Read the article
          2. Identify the 10-15 best spots for literary touches
          3. Apply edits using the Edit tool
          4. Do NOT rewrite sections — add phrases, swap adjectives, insert one-liners
          POLISH_EOF

      - name: Polish with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/polish-prompt.md
          allowed_tools: Read,Edit,Grep

      - name: Validate mermaid syntax
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"

          if [ ! -f "$ARTICLE" ]; then
            echo "No article — skipping mermaid validation"
            exit 0
          fi

          # Extract all mermaid blocks
          python3 << 'PYEOF'
          import re, sys, os, subprocess, json

          slug = os.environ.get("TARGET_REPO", "").replace("/", "-")
          path = f"case-studies/{slug}.md"

          with open(path) as f:
              content = f.read()

          blocks = re.findall(r'```mermaid\n(.*?)```', content, re.DOTALL)

          if not blocks:
              print("No mermaid blocks found")
              sys.exit(0)

          print(f"Found {len(blocks)} mermaid block(s)")
          errors = []

          for i, block in enumerate(blocks):
              # Basic syntax checks
              block_stripped = block.strip()
              first_line = block_stripped.split('\n')[0].strip()

              valid_starts = ['graph ', 'flowchart ', 'sequenceDiagram', 'classDiagram',
                              'stateDiagram', 'erDiagram', 'gantt', 'pie ', 'pie\n',
                              'journey', 'gitGraph', 'mindmap', 'timeline',
                              'quadrantChart', 'xychart', 'sankey', 'block']

              if not any(first_line.startswith(s) or first_line == s.strip() for s in valid_starts):
                  errors.append(f"Block {i+1}: unrecognized diagram type '{first_line}'")
                  continue

              # Gantt-specific checks
              if first_line == 'gantt':
                  if 'dateFormat' not in block_stripped:
                      errors.append(f"Block {i+1} (gantt): missing dateFormat")
                  if 'section' not in block_stripped:
                      errors.append(f"Block {i+1} (gantt): missing section")

              # Pie-specific checks
              if first_line.startswith('pie'):
                  lines = [l.strip() for l in block_stripped.split('\n')[1:] if l.strip()]
                  for line in lines:
                      if line.startswith('"') and ':' not in line:
                          errors.append(f"Block {i+1} (pie): malformed entry '{line}' — needs : value")

              # Sequence diagram checks
              if first_line == 'sequenceDiagram':
                  if 'participant' not in block_stripped and '->>' not in block_stripped:
                      errors.append(f"Block {i+1} (sequence): no participants or messages")

              # Graph/flowchart checks
              if first_line.startswith('graph') or first_line.startswith('flowchart'):
                  if '-->' not in block_stripped and '---' not in block_stripped:
                      errors.append(f"Block {i+1} (graph): no edges defined")

              print(f"Block {i+1} ({first_line}): basic syntax OK")

          if errors:
              print(f"\nERRORS FOUND ({len(errors)}):")
              for e in errors:
                  print(f"  - {e}")
              # Write errors for the fix step
              with open('/tmp/mermaid-errors.txt', 'w') as f:
                  f.write('\n'.join(errors))
              sys.exit(1)
          else:
              print("\nAll mermaid blocks passed validation")
          PYEOF

      - name: Fix mermaid errors (if any)
        if: failure()
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Mermaid syntax errors were found in the case study article.
            Read /tmp/mermaid-errors.txt for the error list.
            Read the article and fix each mermaid block that has errors.
            Common fixes:
            - gantt: add dateFormat YYYY-MM-DD HH:mm and axisFormat %H:%M
            - pie: ensure every entry has "label" : value format
            - graph: ensure edges use --> or ---
            - sequenceDiagram: ensure participants are declared
            Do NOT change any non-mermaid content.
          allowed_tools: Read,Edit,Grep

      - name: Generate and compress cover image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          DATE=$(date +%Y-%m-%d)
          mkdir -p case-studies/images

          # Generate via DALL-E
          curl -s https://api.openai.com/v1/images/generations \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-image-1",
              "prompt": "Minimalist editorial illustration in warm amber and deep navy. A magnifying glass over code on an open book. Two figures reviewing work together collaboratively. No text, no logos. Style: The New Yorker meets a tech blog. 16:9.",
              "n": 1,
              "size": "1536x1024",
              "quality": "high"
            }' | python3 -c "
          import sys, json, base64
          data = json.load(sys.stdin)
          if 'data' in data and data['data']:
              img = data['data'][0]
              if 'b64_json' in img:
                  with open('/tmp/cover-raw.png', 'wb') as f:
                      f.write(base64.b64decode(img['b64_json']))
                  print('saved')
          " 2>/dev/null || echo "Cover image generation failed"

          # Compress PNG (try pngquant, fall back to python PIL, fall back to raw copy)
          IMG_DEST="case-studies/images/${DATE}-${SLUG}-cover.png"
          if [ -f /tmp/cover-raw.png ]; then
            if command -v pngquant &>/dev/null; then
              pngquant --quality=65-80 --output "$IMG_DEST" /tmp/cover-raw.png 2>/dev/null && echo "Compressed with pngquant"
            elif python3 -c "from PIL import Image" 2>/dev/null; then
              python3 -c "
          from PIL import Image
          img = Image.open('/tmp/cover-raw.png')
          img = img.convert('RGB')
          img.save('${IMG_DEST}'.replace('.png', '.jpg'), 'JPEG', quality=75, optimize=True)
          " 2>/dev/null && IMG_DEST="${IMG_DEST%.png}.jpg" && echo "Compressed with PIL to JPEG"
            else
              cp /tmp/cover-raw.png "$IMG_DEST" && echo "No compression tool — raw copy"
            fi

            RAW_SIZE=$(stat -f%z /tmp/cover-raw.png 2>/dev/null || stat -c%s /tmp/cover-raw.png 2>/dev/null || echo "?")
            FINAL_SIZE=$(stat -f%z "$IMG_DEST" 2>/dev/null || stat -c%s "$IMG_DEST" 2>/dev/null || echo "?")
            echo "Image: $RAW_SIZE -> $FINAL_SIZE bytes"
          fi

          # Rename article with date prefix
          OLD_ARTICLE="case-studies/${SLUG}.md"
          NEW_ARTICLE="case-studies/${DATE}-${SLUG}.md"
          if [ -f "$OLD_ARTICLE" ]; then
            mv "$OLD_ARTICLE" "$NEW_ARTICLE"
          fi

          # Insert image reference after title
          IMG_BASENAME=$(basename "$IMG_DEST")
          if [ -f "$IMG_DEST" ] && [ -f "$NEW_ARTICLE" ]; then
            python3 << PYEOF
          import re, os
          article = "${NEW_ARTICLE}"
          img_ref = "images/${IMG_BASENAME}"
          with open(article) as f:
              content = f.read()
          content = re.sub(r'^(# .+)$', r'\1\n\n![Cover](' + img_ref + ')', content, count=1, flags=re.MULTILINE)
          with open(article, 'w') as f:
              f.write(content)
          PYEOF
          fi

      - name: Commit and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_NUM: ${{ steps.target.outputs.issue }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          DATE=$(date +%Y-%m-%d)

          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git add case-studies/
          git diff --cached --quiet || {
            git commit -m "case-study: $TARGET_REPO"
            git push
          }

          # Update registry
          jq --arg name "$TARGET_REPO" --arg cs "case-studies/${DATE}-${SLUG}.md" \
             '.repos[$name].status = "complete" | .repos[$name].case_study = $cs' \
             registry/repos.json > /tmp/reg.json && mv /tmp/reg.json registry/repos.json

          git add registry/repos.json
          git diff --cached --quiet || {
            git commit -m "chore: mark $TARGET_REPO complete"
            git push
          }

          # Comment and close issue
          SUMMARY="Case study published"
          [ -f /tmp/case-study-summary.txt ] && SUMMARY=$(cat /tmp/case-study-summary.txt)

          gh issue comment "$ISSUE_NUM" \
            --body "Case study published: [case-studies/${DATE}-${SLUG}.md](case-studies/${DATE}-${SLUG}.md) — ${SUMMARY}" \
            2>/dev/null || true
          gh issue edit "$ISSUE_NUM" --add-label "complete" --remove-label "case-study-ready" 2>/dev/null || true
          gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true
