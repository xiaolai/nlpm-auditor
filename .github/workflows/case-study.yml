name: Write Case Study

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/name)'
        required: true
      issue_number:
        description: 'Tracking issue number'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  write:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'case-study-ready')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "repo=$INPUT_REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            REPO=$(echo "$ISSUE_TITLE" | sed 's/Audit candidate: //')
            echo "repo=$REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather evidence from GitHub
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          mkdir -p /tmp/evidence

          # Repo metadata
          gh api "repos/$TARGET_REPO" --jq '{
            name: .full_name, description: .description,
            stars: .stargazers_count, forks: .forks_count,
            owner_login: .owner.login, owner_type: .owner.type
          }' > /tmp/evidence/repo.json

          # Owner profile
          OWNER=$(echo "$TARGET_REPO" | cut -d/ -f1)
          gh api "users/$OWNER" --jq '{login, name, html_url}' \
            > /tmp/evidence/owner.json 2>/dev/null || echo "{}" > /tmp/evidence/owner.json

          # Our PRs and issues
          gh pr list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,mergedAt,labels,url \
            > /tmp/evidence/prs.json 2>/dev/null || echo "[]" > /tmp/evidence/prs.json

          gh issue list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,url \
            > /tmp/evidence/issues.json 2>/dev/null || echo "[]" > /tmp/evidence/issues.json

          # Commits mentioning NLPM or Claude co-authorship
          gh api "repos/$TARGET_REPO/commits?per_page=50" \
            --jq '[.[] | select(.commit.message | test("nlpm|NLPM|Co-Authored-By.*Claude"; "i")) | {
              sha: .sha, message: .commit.message,
              date: .commit.committer.date, url: .html_url
            }]' > /tmp/evidence/commits.json 2>/dev/null || echo "[]" > /tmp/evidence/commits.json

          # PR review comments
          jq -r '.[].number' /tmp/evidence/prs.json 2>/dev/null | while read -r pr_num; do
            gh api "repos/$TARGET_REPO/pulls/$pr_num/reviews" \
              --jq '[.[] | {user: .user.login, state: .state, body: .body}]' \
              > "/tmp/evidence/pr-${pr_num}-reviews.json" 2>/dev/null || true
            sleep 1
          done

          # Copy audit report
          REPORT="audits/${TARGET_REPO//\//-}.md"
          [ -f "$REPORT" ] && cp "$REPORT" /tmp/evidence/audit-report.md || echo "No audit report" > /tmp/evidence/audit-report.md

      - name: Prepare case study prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/case-study-prompt.md <<PROMPT_EOF
          You are writing a case study article about an NLPM audit engagement.

          ## Source Material

          All evidence is in /tmp/evidence/ — read EVERY file:
          - repo.json: target repo metadata
          - owner.json: repo owner profile
          - prs.json: all PRs we submitted (with URLs)
          - issues.json: tracking issues we created
          - commits.json: commits mentioning NLPM or Claude
          - pr-*-reviews.json: maintainer review comments
          - audit-report.md: the full NLPM scoring report

          ## Article Template

          Write to: case-studies/$SLUG.md

          Structure:
          1. **Title** — creative, hints at what was learned
          2. **Disclosure** — mandatory blockquote:
             > **Disclosure**: This article was generated by an automated pipeline using Claude (Sonnet 4.6) based on audit data and GitHub records. It describes work performed by NLPM tooling maintained by [xiaolai](https://github.com/xiaolai). Readers should weigh claims accordingly.
          3. **The Project** — what it is, who maintains it (link owner profile), star count (once)
          4. **The Audit** — overall score, distribution (mermaid pie chart), top issues, fair assessment
          5. **What Was Submitted** — each PR with GitHub URL, title, fix description
          6. **The Response** — maintainer reaction from review comments and commits
          7. **What the Audit Revealed** — patterns with fairness note
          8. **Timeline** — mermaid gantt chart from PR/issue timestamps
          9. **Limitations** — what this doesn't prove
          10. **Significance** — measured, not inflated

          ## Style Rules
          - Soft, polite tone — never presumptuous
          - Similes and metaphors sparingly
          - ALL links from evidence files — never fabricate URLs
          - ALL numbers from evidence files — never guess
          - Mermaid gantt: use dateFormat YYYY-MM-DD HH:mm
          - If evidence is missing for a section, say so honestly

          ## Also write
          - /tmp/case-study-summary.txt: one-line summary for the issue comment
          PROMPT_EOF

      - name: Write with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/case-study-prompt.md
          allowed_tools: Read,Glob,Grep,Write,Bash

      - name: Generate cover image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"

          curl -s https://api.openai.com/v1/images/generations \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-image-1",
              "prompt": "Minimalist editorial illustration in warm amber and deep navy. A magnifying glass over code on an open book. Two figures reviewing work together collaboratively. No text, no logos. Style: The New Yorker meets a tech blog. 16:9.",
              "n": 1,
              "size": "1536x1024",
              "quality": "high"
            }' | python3 -c "
          import sys, json, base64
          data = json.load(sys.stdin)
          if 'data' in data and data['data']:
              img = data['data'][0]
              if 'b64_json' in img:
                  with open('case-studies/${SLUG}-cover.png', 'wb') as f:
                      f.write(base64.b64decode(img['b64_json']))
                  print('saved')
          " 2>/dev/null || echo "Cover image skipped"

          # Insert image after title if both exist
          if [ -f "case-studies/${SLUG}-cover.png" ] && [ -f "case-studies/${SLUG}.md" ]; then
            python3 << 'PYEOF'
          import re, sys, os
          slug = os.environ.get("SLUG", "")
          path = f"case-studies/{slug}.md"
          with open(path) as f:
              content = f.read()
          img_line = f"\n\n![Cover]({slug}-cover.png)"
          content = re.sub(r'^(# .+)$', r'\1' + img_line, content, count=1, flags=re.MULTILINE)
          with open(path, 'w') as f:
              f.write(content)
          PYEOF
          fi

      - name: Commit and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_NUM: ${{ steps.target.outputs.issue }}
        run: |
          SLUG="${TARGET_REPO//\//-}"

          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git add case-studies/ registry/
          git diff --cached --quiet || {
            git commit -m "case-study: $TARGET_REPO"
            git push
          }

          # Update registry
          jq --arg name "$TARGET_REPO" --arg cs "case-studies/${SLUG}.md" \
             '.repos[$name].status = "complete" | .repos[$name].case_study = $cs' \
             registry/repos.json > /tmp/reg.json && mv /tmp/reg.json registry/repos.json

          git add registry/repos.json
          git diff --cached --quiet || {
            git commit -m "chore: mark $TARGET_REPO complete"
            git push
          }

          # Comment and close issue
          SUMMARY="Case study published"
          [ -f /tmp/case-study-summary.txt ] && SUMMARY=$(cat /tmp/case-study-summary.txt)

          gh issue comment "$ISSUE_NUM" \
            --body "Case study published: [case-studies/${SLUG}.md](case-studies/${SLUG}.md) — ${SUMMARY}" \
            2>/dev/null || true
          gh issue edit "$ISSUE_NUM" --add-label "complete" --remove-label "case-study-ready" 2>/dev/null || true
          gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true
